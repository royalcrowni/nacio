<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nacio</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background-color: #DFDBD5;
    overflow: hidden;
  }

  .stage {
    position: relative;
    width: 100%;
    height: 100vh;
  }

  .hanger {
    position: absolute;
    top: 44%;
    left: 50%;
    transform-origin: top center;
    transform: translate(-50%, -50%);
    animation: sway 4.5s ease-in-out infinite;
    cursor: grab;
    touch-action: none;
    -webkit-user-select: none;
    -moz-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
  }

  .hanger, .hanger * {
    -webkit-user-drag: none;
    -khtml-user-drag: none;
    -moz-user-drag: none;
    user-drag: none;
    -webkit-user-select: none;
    -moz-user-select: none;
    user-select: none;
  }

  @keyframes sway {
    0%   { transform: translate(-50%, -50%) rotate(-5deg); }
    50%  { transform: translate(-50%, -50%) rotate(5deg); }
    100% { transform: translate(-50%, -50%) rotate(-5deg); }
  }

  .hook {
    display: block;
    width: 10px;
    aspect-ratio: 21.187 / 17.305;
    margin: 0 auto;
    pointer-events: none;
    transform-origin: top center;
  }

  .frame {
    display: block;
    width: 36px;
    aspect-ratio: 62.583 / 75.748;
    margin-top: -1px;
    pointer-events: none;
    transform-origin: top center;
  }

  .hanger.dragging {
    cursor: grabbing;
  }

  .signature {
    position: absolute;
    top: 70%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 0px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s ease, width 0.8s ease;
  }

  .signature.visible {
    width: 55px;
    opacity: 1;
  }

  .bill-rain {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    pointer-events: none;
    z-index: 999;
  }

  .bill {
    position: absolute;
    top: -60px;
    width: 36px;
    opacity: 0.9;
    animation-name: fall;
    animation-timing-function: linear;
    animation-iteration-count: 1;
  }

  @keyframes fall {
    from { transform: translateY(0); }
    to   { transform: translateY(160vh); }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="hanger" id="hanger">
    <img class="hook" id="hook" src="lacio.svg" alt="" draggable="false">
    <img class="frame" id="frame" src="nacio.svg" alt="" draggable="false">
  </div>
  <img class="signature" id="signature" src="nacio_.svg" alt="">
</div>

<div class="bill-rain" id="billRain"></div>

<script>
  const hanger = document.getElementById('hanger');
  const hook = document.getElementById('hook');
  const frame = document.getElementById('frame');
  const signature = document.getElementById('signature');
  const billRain = document.getElementById('billRain');
  let clicks = 0;
  let billsSpawned = false;

  const MAX_DRAG = 115;
  const CLICK_THRESHOLD = 4;
  let hookHeightCache = hook.getBoundingClientRect().height || 1;
  let dragging = false;
  let pointerId = null;
  let startX = 0;
  let startY = 0;
  let dragDist = 0;
  let lastDx = 0;
  let lastDy = 0;
  let sceneAngle = 0;

  function getRotationDeg(el) {
    const t = getComputedStyle(el).transform;
    if (t === 'none') return 0;
    const m = t.match(/matrix\(([^)]+)\)/);
    if (!m) return 0;
    const v = m[1].split(',').map(Number);
    return Math.atan2(v[1], v[0]) * (180 / Math.PI);
  }

  function applyStretch(dx, dy, dist) {
    const hookHeight = hookHeightCache;
    // exact vector from the hook's fixed pivot to the frame's dragged attach point,
    // so the stretched hook always lands precisely on the frame regardless of direction
    const vx = dx;
    const vy = hookHeight + dy;
    const newLen = Math.sqrt(vx * vx + vy * vy);
    const stretch = newLen / hookHeight;
    const squeeze = Math.max(0.55, 1 - dist / 180);
    const angle = dist > 0.5 ? Math.atan2(-vx, vy) * (180 / Math.PI) : 0;
    hook.style.transform = `rotate(${angle}deg) scaleY(${stretch}) scaleX(${squeeze})`;
    frame.style.transform = `translate(${dx}px, ${dy}px)`;
  }

  function easeOutElastic(t) {
    const c4 = (2 * Math.PI) / 3;
    return t <= 0 ? 0 : t >= 1 ? 1 : Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * c4) + 1;
  }

  let bounceFrameId = null;

  function settleBack(dx0, dy0) {
    if (bounceFrameId !== null) {
      cancelAnimationFrame(bounceFrameId);
      bounceFrameId = null;
    }

    hook.style.transition = 'none';
    frame.style.transition = 'none';
    hanger.classList.remove('dragging');

    const duration = 900;
    const startTime = performance.now();

    function step(now) {
      const t = Math.min((now - startTime) / duration, 1);
      const eased = easeOutElastic(t);
      const remaining = 1 - eased;
      const curDx = dx0 * remaining;
      const curDy = dy0 * remaining;
      const curDist = Math.sqrt(curDx * curDx + curDy * curDy);
      applyStretch(curDx, curDy, curDist);

      if (t < 1) {
        bounceFrameId = requestAnimationFrame(step);
      } else {
        applyStretch(0, 0, 0);
        bounceFrameId = null;
        // resume the idle sway exactly where it was paused, no restart/jump
        hanger.style.animationPlayState = 'running';
      }
    }

    bounceFrameId = requestAnimationFrame(step);
  }

  function startDrag(e) {
    e.preventDefault();
    if (bounceFrameId !== null) {
      cancelAnimationFrame(bounceFrameId);
      bounceFrameId = null;
    }
    dragging = true;
    pointerId = e.pointerId;
    startX = e.clientX;
    startY = e.clientY;
    dragDist = 0;
    lastDx = 0;
    lastDy = 0;
    // freeze the idle sway exactly where it is (no snap) and remember the
    // angle, so mouse movement can be converted into the hanger's tilted
    // local axes instead of forcing the rotation to 0 and causing a jump
    sceneAngle = getRotationDeg(hanger);
    hanger.style.animationPlayState = 'paused';
    hanger.classList.add('dragging');
    hook.style.transition = 'none';
    frame.style.transition = 'none';
    hookHeightCache = hook.getBoundingClientRect().height || hookHeightCache;
    hanger.setPointerCapture(pointerId);
  }

  function moveDrag(e) {
    if (!dragging || e.pointerId !== pointerId) return;
    e.preventDefault();
    const rawDx = e.clientX - startX;
    const rawDy = e.clientY - startY;
    // rotate the real screen-space movement into the hanger's local
    // (possibly tilted) axes, so the frame always follows the cursor exactly
    const rad = (-sceneAngle * Math.PI) / 180;
    let dx = rawDx * Math.cos(rad) - rawDy * Math.sin(rad);
    let dy = rawDx * Math.sin(rad) + rawDy * Math.cos(rad);
    let dist = Math.sqrt(dx * dx + dy * dy);
    if (dist > MAX_DRAG) {
      const ratio = MAX_DRAG / dist;
      dx *= ratio;
      dy *= ratio;
      dist = MAX_DRAG;
    }
    dragDist = dist;
    lastDx = dx;
    lastDy = dy;
    applyStretch(dx, dy, dist);
  }

  function endDrag(e) {
    if (!dragging || e.pointerId !== pointerId) return;
    dragging = false;
    const moved = dragDist;
    settleBack(lastDx, lastDy);

    if (moved < CLICK_THRESHOLD) {
      registerClick();
    }
  }

  hanger.addEventListener('pointerdown', startDrag);
  window.addEventListener('pointermove', moveDrag);
  window.addEventListener('pointerup', endDrag);
  window.addEventListener('pointercancel', endDrag);
  hanger.addEventListener('dragstart', (e) => e.preventDefault());

  function spawnBillRain() {
    const billCount = 80;
    for (let i = 0; i < billCount; i++) {
      const bill = document.createElement('img');
      bill.src = 'naciobill.svg';
      bill.className = 'bill';
      bill.style.left = Math.random() * 100 + 'vw';
      const duration = 3 + Math.random() * 2.5;
      const delay = Math.random() * 1.5;
      bill.style.animationDuration = duration + 's';
      bill.style.animationDelay = delay + 's';
      billRain.appendChild(bill);
      bill.addEventListener('animationend', (ev) => {
        if (ev.animationName === 'fall') bill.remove();
      });
    }
  }

  setTimeout(() => {
    signature.classList.add('visible');
  }, 9000);

  function registerClick() {
    clicks++;

    if (clicks === 13 && !billsSpawned) {
      billsSpawned = true;
      spawnBillRain();
    }

    if (clicks >= 101) {
      window.location.href = 'https://www.manzano.cc';
    }
  }
</script>

</body>
</html>
